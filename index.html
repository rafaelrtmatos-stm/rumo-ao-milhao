<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Rumo ao Milhão - Gestão Imobiliária</title>

    <!-- Favicon PC -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=2" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=2" />

    <!-- iPhone / iPad (ícone na tela inicial) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RA1M" />
    <style>
      /* Evitar piscada (FOUC) — root invisível até LoadingScreen montar */
      body { background: #0d200d; margin: 0; }
      #root { opacity: 0; }
      #root.ready { opacity: 1; transition: opacity 0.15s ease-in; }
    </style>

    <meta name="theme-color" content="#000000" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="vercel-toolbar" content="false" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
      <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch((error) => {
            console.warn('Service Worker não registrado:', error);
          });
        });
      }
    </script>
  </body>
</html>
