<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rumo ao Milhão - Offline</title>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; background: #f8fafc; color: #0f172a; display: flex; min-height: 100vh; align-items: center; justify-content: center; padding: 24px; }
      .card { max-width: 420px; background: white; border-radius: 20px; padding: 24px; box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12); text-align: center; }
      h1 { margin: 0 0 12px; font-size: 22px; }
      p { margin: 0 0 16px; line-height: 1.45; color: #475569; }
      button { border: 0; border-radius: 12px; padding: 12px 16px; background: #16a34a; color: white; font-weight: 700; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Você está offline</h1>
      <p>O aplicativo tentará abrir os dados salvos da última sincronização. Conecte-se à internet para concluir vendas e atualizar informações.</p>
      <button onclick="location.reload()">Tentar novamente</button>
    </main>
  </body>
</html>
